name: "SemVer Tag Validation"

on:
  push:
    tags:
      - "*"

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semantic version tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Validating tag: ${TAG}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-](rc|beta|alpha)[0-9]*)?$ ]]; then
            echo "Tag ${TAG} is not a valid semantic version tag."
            exit 1
          fi
