name: "Shopping Assistant Quality"

on:
  pull_request:
    paths:
      - "src/shoppingassistantservice/**"
      - ".github/workflows/shoppingassistant-quality-ci.yaml"
  push:
    branches: ["main"]
    paths:
      - "src/shoppingassistantservice/**"
      - ".github/workflows/shoppingassistant-quality-ci.yaml"

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/shoppingassistantservice/requirements.txt
      - name: Ruff
        working-directory: src/shoppingassistantservice
        run: ruff check .
      - name: Mypy
        working-directory: src/shoppingassistantservice
        run: mypy shoppingassistantservice.py
      - name: Pytest
        working-directory: src/shoppingassistantservice
        run: pytest
