apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cartservice
    spec:
      template:
        spec:
          containers:
            - name: server
              env:
              - name: REDIS_ADDR
                value: "host.docker.internal:6379"
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: shoppingassistantservice
    spec:
      template:
        spec:
          containers:
            - name: server
              env:
              - name: MODEL_PROVIDER
                value: "ollama"
              - name: OLLAMA_BASE_URL
                value: "http://host.docker.internal:11434"
              - name: OLLAMA_MODEL
                value: "qwen2.5:7b"
              - name: VECTORSTORE_BACKEND
                value: "json"
              - name: PRODUCT_CATALOG_JSON
                value: "/shoppingassistantservice/products.local.json"
