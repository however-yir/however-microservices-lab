apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoppingassistantservice-canary
  labels:
    app: shoppingassistantservice
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shoppingassistantservice
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: shoppingassistantservice
        track: canary
    spec:
      containers:
      - name: server
        image: shoppingassistantservice
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: MODEL_PROVIDER
          value: "ollama"
        - name: VECTORSTORE_BACKEND
          value: "json"
        - name: PRODUCT_CATALOG_JSON
          value: "/shoppingassistantservice/products.local.json"
        - name: OLLAMA_BASE_URL
          value: "http://ollama.ollama.svc.cluster.local:11434"
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /livez
            port: 8080
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shoppingassistantservice-canary
  labels:
    app: shoppingassistantservice
    track: canary
spec:
  selector:
    app: shoppingassistantservice
    track: canary
  ports:
  - name: http
    port: 80
    targetPort: 8080
