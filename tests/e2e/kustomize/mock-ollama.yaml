apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: server
          image: python:3.11-alpine
          ports:
            - containerPort: 11434
          command:
            - python
            - -c
            - |
              import json
              from http.server import BaseHTTPRequestHandler, HTTPServer

              class Handler(BaseHTTPRequestHandler):
                  def do_POST(self):
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(json.dumps({
                          "response": "Warm minimalist style with practical accessories. 推荐ID: [2ZYFJ3GM2N], [OLJCESPC7Z], [LS4PSXUNUM]"
                      }).encode("utf-8"))

                  def do_GET(self):
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"ok")

                  def log_message(self, format, *args):
                      return

              HTTPServer(("0.0.0.0", 11434), Handler).serve_forever()
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
